<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار البوت</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .phone-shell {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      background: #ece5dd;
    }

    .wa-header {
      background: #075E54;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      direction: rtl;
    }
    .wa-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: #25D366;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: #fff; font-weight: 600; flex-shrink: 0;
    }
    .wa-name { color: #fff; font-size: 15px; font-weight: 600; }
    .wa-status { color: #b2dfdb; font-size: 12px; }

    .messages {
      height: 460px;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #ece5dd;
    }

    .msg {
      max-width: 78%;
      padding: 8px 11px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.bot {
      background: #fff;
      align-self: flex-start;
      border-radius: 0 8px 8px 8px;
      color: #111;
      direction: rtl;
      text-align: right;
    }
    .msg.user {
      background: #dcf8c6;
      align-self: flex-end;
      border-radius: 8px 0 8px 8px;
      color: #111;
      direction: rtl;
      text-align: right;
    }
    .msg-time {
      font-size: 10px;
      color: #999;
      text-align: left;
      margin-top: 3px;
      direction: ltr;
    }

    .typing {
      background: #fff;
      align-self: flex-start;
      border-radius: 0 8px 8px 8px;
      padding: 10px 14px;
      display: none;
      gap: 4px;
      align-items: center;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #f0f0f0;
      direction: rtl;
    }
    .input-row input {
      flex: 1;
      border-radius: 20px;
      border: none;
      padding: 9px 14px;
      font-size: 14px;
      background: #fff;
      direction: rtl;
      text-align: right;
      outline: none;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #111;
    }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #075E54;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #128C7E; }
    .send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .bottom-bar {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .reset-btn {
      font-size: 12px;
      color: #555;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 5px 14px;
      cursor: pointer;
    }
    .reset-btn:hover { background: #f5f5f5; }
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      direction: rtl;
    }
  </style>
</head>
<body>

  <div class="phone-shell">
    <div class="wa-header">
      <div>
        <div class="wa-name">مختبر الفرانشايز</div>
        <div class="wa-status">متصل الآن</div>
      </div>
      <div class="wa-avatar">م</div>
    </div>

    <div class="messages" id="messages">
      <div class="msg bot">
        أهلاً وسهلاً! 👋 أنا مساعدك في مختبر الفرانشايز. عايز تحجز موعد أو تسأل عن الخدمات؟
        <div class="msg-time" id="init-time"></div>
      </div>
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-row">
      <button class="send-btn" id="send-btn" aria-label="إرسال">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
      <input type="text" id="msg-input" placeholder="اكتب رسالتك..." />
    </div>
  </div>

  <div class="bottom-bar">
    <div class="error-msg" id="error-area"></div>
    <button class="reset-btn" id="reset-btn">🔄 محادثة جديدة</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const typingEl   = document.getElementById('typing');
    const inputEl    = document.getElementById('msg-input');
    const sendBtn    = document.getElementById('send-btn');
    const resetBtn   = document.getElementById('reset-btn');
    const errorArea  = document.getElementById('error-area');

    document.getElementById('init-time').textContent = now();

    let history = [];
    let sending = false;

    function now() {
      return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = text.replace(/\n/g, '<br>') + '<div class="msg-time">' + now() + '</div>';
      messagesEl.insertBefore(div, typingEl);
      scrollBottom();
    }

    function showTyping(show) {
      typingEl.style.display = show ? 'flex' : 'none';
      scrollBottom();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      errorArea.textContent = '';
      sending = true;
      sendBtn.disabled = true;
      inputEl.value = '';

      addMsg(text, 'user');
      history.push({ role: 'user', content: text });
      showTyping(true);

      try {
        const res = await fetch('/api/chat/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history })
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const reply = data.reply || data.message || '...';

        showTyping(false);
        addMsg(reply, 'bot');
        history.push({ role: 'assistant', content: reply });

      } catch (e) {
        showTyping(false);
        errorArea.textContent = 'فيه مشكلة في الاتصال — تأكد إن السيرفر شغال.';
      }

      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    resetBtn.addEventListener('click', () => {
      history = [];
      errorArea.textContent = '';
      const msgs = messagesEl.querySelectorAll('.msg.user, .msg.bot:not(:first-child)');
      msgs.forEach(m => m.remove());
    });
  </script>

</body>
</html>
